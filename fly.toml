# fly.toml app configuration file for DrivePrep on Fly.io
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "pdr-prep"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8000"
  RUN_STARTUP_MAINTENANCE = "false"
  RUN_CONTAINER_BOOTSTRAP = "false"
  DATABASE_SSL = "false"
  DATABASE_SCHEMA = "driveprep"
  EMAIL_PROVIDER = "smtp"
  FRONTEND_URL = "https://pdr-prep.fly.dev"
  BACKEND_PUBLIC_URL = "https://pdr-prep.fly.dev"
  PAYMENT_MODE = "mock"
  ALLOW_MOCK_PAYMENTS = "true"
  SMTP_HOST = "smtp.gmail.com"
  SMTP_PORT = "465"
  SMTP_SECURE = "true"
  SMTP_TIMEOUT = "10"

[deploy]
  release_command = "python backend/scripts/render_migrate.py"
  release_command_timeout = "10m"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 80
    hard_limit = 120

  [[http_service.checks]]
    grace_period = "300s"
    interval = "30s"
    method = "GET"
    timeout = "10s"
    path = "/api/health"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
