# fly.toml app configuration file generated for pdr-prep on 2026-06-01T23:06:15Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pdr-prep'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  release_command = 'python backend/scripts/render_migrate.py'
  release_command_timeout = '10m0s'

[env]
  ALLOW_MOCK_PAYMENTS = 'false'
  BACKEND_PUBLIC_URL = 'https://pdr-prep.fly.dev'
  DATABASE_SCHEMA = 'driveprep'
  DATABASE_SSL = 'true'
  EMAIL_FROM = 'DrivePrep <onboarding@resend.dev>'
  EMAIL_PROVIDER = 'resend'
  FRONTEND_URL = 'https://pdr-prep.fly.dev'
  NODE_ENV = 'production'
  PAYMENT_MODE = 'liqpay'
  PORT = '8000'
  RUN_CONTAINER_BOOTSTRAP = 'false'
  RUN_STARTUP_MAINTENANCE = 'false'
  SMTP_HOST = 'smtp.gmail.com'
  SMTP_PORT = '465'
  SMTP_SECURE = 'true'
  SMTP_TIMEOUT = '6'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 120
    soft_limit = 80

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '5m0s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
