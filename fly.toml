# fly.toml app configuration file generated for app-icy-night-2849 on 2026-06-01T22:37:51Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "app-icy-night-2849"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8000"
  RUN_STARTUP_MAINTENANCE = "false"
  DATABASE_SSL = "true"
  DATABASE_SCHEMA = "driveprep"
  EMAIL_PROVIDER = "resend"
  EMAIL_FROM = "DrivePrep <onboarding@resend.dev>"
  FRONTEND_URL = "https://app-icy-night-2849.fly.dev"
  BACKEND_PUBLIC_URL = "https://app-icy-night-2849.fly.dev"
  PAYMENT_MODE = "liqpay"
  ALLOW_MOCK_PAYMENTS = "false"
  SMTP_HOST = "smtp.gmail.com"
  SMTP_PORT = "465"
  SMTP_SECURE = "true"
  SMTP_TIMEOUT = "6"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 80
    hard_limit = 120

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
