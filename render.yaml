services:
  - type: web
    name: driveprep-pdr
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    preDeployCommand: python backend/scripts/render_migrate.py
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RUN_STARTUP_MAINTENANCE
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: driveprep-pdr-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://driveprep-pdr.onrender.com
      - key: BACKEND_PUBLIC_URL
        value: https://driveprep-pdr.onrender.com
      - key: PAYMENT_MODE
        value: mock
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"

databases:
  - name: driveprep-pdr-db
    plan: free
    databaseName: driveprep
    user: driveprep_user
