services:
  - type: web
    name: driveprep-pdr
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RUN_STARTUP_MAINTENANCE
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://driveprep-pdr.onrender.com
      - key: BACKEND_PUBLIC_URL
        value: https://driveprep-pdr.onrender.com
      - key: PAYMENT_MODE
        value: mock
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
