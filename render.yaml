services:
  - type: web
    name: driveprep-pdr
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: driveprep-pdr-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://driveprep-pdr.onrender.com
      - key: BACKEND_PUBLIC_URL
        value: https://driveprep-pdr.onrender.com
      - key: PAYMENT_MODE
        value: mock
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: LIQPAY_PUBLIC_KEY
        sync: false
      - key: LIQPAY_PRIVATE_KEY
        sync: false

databases:
  - name: driveprep-pdr-db
    plan: free
    databaseName: driveprep
    user: driveprep_user
