services:
  - type: web
    name: driveprep-pdr
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RUN_STARTUP_MAINTENANCE
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SCHEMA
        value: driveprep
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: EMAIL_PROVIDER
        value: resend
      - key: EMAIL_FROM
        value: DrivePrep <onboarding@resend.dev>
      - key: RESEND_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://driveprep-pdr.onrender.com
      - key: BACKEND_PUBLIC_URL
        value: https://driveprep-pdr.onrender.com
      - key: PAYMENT_MODE
        value: liqpay
      - key: ALLOW_MOCK_PAYMENTS
        value: "false"
      - key: LIQPAY_PUBLIC_KEY
        sync: false
      - key: LIQPAY_PRIVATE_KEY
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_TIMEOUT
        value: "6"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
